<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual IPTV Stream Tester</title>
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 30px;
      background-color: #0b0c10;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { color: #66fcf1; margin-bottom: 5px; font-size: 22px; }
    p.sub { margin-top: 0; margin-bottom: 25px; color: #46a29f; font-size: 14px; }
    
    #player-wrapper {
      width: 800px;
      height: 450px;
      background: #000;
      border: 2px solid #46a29f;
      border-radius: 6px;
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    
    #controls {
      margin-top: 20px;
      width: 800px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input[type="text"] {
      flex-grow: 1;
      padding: 12px;
      background: #1f2833;
      color: #fff;
      border: 1px solid #46a29f;
      border-radius: 4px;
      font-size: 14px;
    }
    input[type="text"]:focus { outline: none; border-color: #66fcf1; }
    
    button {
      padding: 12px 24px;
      background: #46a29f;
      color: #0b0c10;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #66fcf1; }
    
    #console {
      margin-top: 15px;
      width: 760px;
      font-size: 13px;
      color: #c5a3ff;
      background: #151515;
      padding: 12px 20px;
      border-radius: 4px;
      border-left: 4px solid #66fcf1;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h1>Manual IPTV HLS Stream Tester</h1>
  <p class="sub">Paste any live .m3u8 link directly into the input bar to verify playback</p>

  <div id="player-wrapper">
    <div id="player"></div>
  </div>

  <div id="controls">
    <input type="text" id="streamInput" placeholder="Paste your https://.../index.m3u8 link here">
    <button id="playBtn">Play Stream Now</button>
  </div>

  <div id="console">System Ready: Input an active stream link destination to connect to the video grid...</div>

  <script type="text/javascript">
    var defaultTestURL = 'https://unified-streaming.com';
    let playerInstance = null;

    function loadVideoTrack(streamURL) {
      const log = document.getElementById('console');
      
      if (!streamURL || !streamURL.trim().startsWith('http')) {
        log.innerHTML = "<span style='color:#ff4a4a;'>[ERROR] Invalid URL format. Link must start with http:// or https://</span>";
        return;
      }

      log.innerText = `[CORE] Connecting to stream source payload: \n${streamURL}`;
      
      if (playerInstance) {
        playerInstance.destroy();
      }

      playerInstance = new Clappr.Player({
        source: streamURL.trim(),
        parentId: "#player",
        width: '100%',
        height: '100%',
        autoPlay: true
      });
    }

    function initTestingSuite() {
      const streamInput = document.getElementById('streamInput');
      const playBtn = document.getElementById('playBtn');

      streamInput.value = defaultTestURL;
      loadVideoTrack(defaultTestURL);

      playBtn.addEventListener('click', () => {
        loadVideoTrack(streamInput.value);
      });

      streamInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          loadVideoTrack(streamInput.value);
        }
      });
    }

    window.onload = initTestingSuite;
  </script>

</body>
</html>
