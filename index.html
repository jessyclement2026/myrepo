<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages IPTV Live Tester</title>
  
  <!-- FIXED: Consolidated absolute monolithic Clappr distribution path containing all HLS video layers -->
  <script src=" https://cdn.jsdelivr.net/npm/clappr@0.3.13/dist/clappr.min.js "></script>
  <link href=" https://cdn.jsdelivr.net/npm/clappr@0.3.13/src/components/core/public/fonts.min.css " rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 30px;
      background-color: #0b0c10;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { color: #66fcf1; margin-bottom: 5px; font-size: 22px; }
    p.sub { margin-top: 0; margin-bottom: 25px; color: #46a29f; font-size: 14px; }
    
    #player-wrapper {
      width: 800px;
      height: 450px;
      background: #000;
      border: 2px solid #46a29f;
      border-radius: 6px;
      overflow: hidden;
    }
    #player { width: 100%; height: 100%; }
    
    #controls {
      margin-top: 20px;
      width: 800px;
      display: flex;
      gap: 15px;
      align-items: center;
    }
    select {
      flex-grow: 1;
      padding: 12px;
      background: #1f2833;
      color: #fff;
      border: 1px solid #46a29f;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #66fcf1; }
    
    #console {
      margin-top: 15px;
      width: 760px;
      font-size: 13px;
      color: #c5a3ff;
      background: #151515;
      padding: 12px 20px;
      border-radius: 4px;
      border-left: 4px solid #66fcf1;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <h1>IPTV Live Stream Pipeline Tester</h1>
  <p class="sub">Verifying GitHub Actions Extracted M3U8 Tokens inside Clappr Video Core</p>

  <!-- Video canvas container target binding space -->
  <div id="player-wrapper">
    <div id="player"></div>
  </div>

  <!-- Channel navigation stream dropdown module selector -->
  <div id="controls">
    <label for="channelSelect">Select Track:</label>
    <select id="channelSelect" disabled>
      <option>Loading and parsing playlist.m3u asset matrix...</option>
    </select>
  </div>

  <div id="console">System Boot: Initializing stream mapping components...</div>

  <script type="text/javascript">
    // Pristine, permanent fallback video URL signature asset provided by Apple CDN networks
    var backupTestURL = 'https://unified-streaming.com';
    let channelsList = [];
    let playerInstance = null;

    // Fast memory processing parser function mapping plain layout text layers to valid track array objects
    function parseM3uFile(text) {
      const lines = text.split('\n');
      const tracks = [];
      let currentName = "Default Channel";

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
          const commaIdx = line.lastIndexOf(',');
          if (commaIdx !== -1) {
            currentName = line.substring(commaIdx + 1).trim();
          }
        } else if (line.startsWith('http')) {
          tracks.push({
            name: currentName,
            url: line
          });
        }
      }
      return tracks;
    }

    // Instantiates the native Clappr HLS player lifecycle engine
    function loadVideoTrack(streamURL) {
      const log = document.getElementById('console');
      log.innerText = `[CORE] Connecting to stream source payload: ${streamURL}`;
      
      if (playerInstance) {
        playerInstance.destroy();
      }

      // FIXED: Using standard built-in monolithic Clappr initialization structures
      playerInstance = new Clappr.Player({
        source: streamURL,
        parentId: "#player",
        width: '100%',
        height: '100%',
        autoPlay: true
      });
    }

    async function startTestingSuite() {
      const log = document.getElementById('console');
      const selectMenu = document.getElementById('channelSelect');

      try {
        log.innerText = "[CORE] Locating playlist.m3u database from repository tree...";
        
        // Fetching the runtime file compiled dynamically by your GitHub workflow script
        const response = await fetch('./playlist.m3u');
        if (!response.ok) {
          log.innerHTML = "<span style='color:#ff4a4a;'>[FALLBACK] local playlist.m3u missing. Running static test stream.</span>";
          loadVideoTrack(backupTestURL);
          return;
        }

        const rawText = await response.text();
        channelsList = parseM3uFile(rawText);

        if (channelsList.length === 0) {
          log.innerHTML = "<span style='color:#ff4a4a;'>[EMPTY] Playlist parsed but 0 streams found. Playing backup stream.</span>";
          loadVideoTrack(backupTestURL);
          return;
        }

        // Flush placeholders and drop options directly into select menus
        selectMenu.innerHTML = "";
        channelsList.forEach((channel, idx) => {
          const opt = document.createElement('option');
          opt.value = idx;
          opt.innerText = channel.name;
          selectMenu.appendChild(opt);
        });
        selectMenu.disabled = false;

        log.innerHTML = `<span style='color:#66fcf1;'>[SUCCESS] Successfully verified and parsed ${channelsList.length} live tracks. Launching track 1.</span>`;
        loadVideoTrack(channelsList[0].url);

        // Track changes on dropdown selection hooks
        selectMenu.addEventListener('change', (e) => {
          const selectedIdx = e.target.value;
          loadVideoTrack(channelsList[selectedIdx].url);
        });

      } catch (err) {
        console.error(err);
        log.innerHTML = `<span style='color:#ff4a4a;'>[ERROR] Critical exception: ${err.message}</span>`;
        loadVideoTrack(backupTestURL);
      }
    }

    window.onload = startTestingSuite;
  </script>

</body>
</html>
