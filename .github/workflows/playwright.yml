name: Generate and Update IPTV Playlist

on:
  push:
    branches: [ main, master ]
  schedule:
    # Изпълнява се автоматично на всеки 5 минути
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Ensure Firefox is installed
      run: playwright install firefox --with-deps

    - name: Run Scraper Script
      run: python app.py

    - name: Commit and Push Updated Playlist to Main
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add playlist.m3u
        git diff-index --quiet HEAD || (git commit -m "Automated token update" && git push)
