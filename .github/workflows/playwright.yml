name: Generate and Update IPTV Playlist

on:
  push:
    branches: [ main, master ]
  schedule:
    # Runs automatically every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Allows you to manually click "Run workflow" inside GitHub

permissions:
  contents: write

jobs:
  scrape-and-update:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Ensure browsers are installed
      run: python -m playwright install firefox --with-deps

    - name: Run Scraper Script
      run: python app.py

    - name: Commit and Push Updated Playlist to Main
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add playlist.m3u
        # Only commits and pushes if tokens have actually changed
        git diff-index --quiet HEAD || (git commit -m "Automated token update" && git push)
