name: Generate and Update list

on:
  push:
    branches: [ main, master ]
  schedule:
    # Runs automatically every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Allows you to manually click "Run workflow" inside GitHub

permissions:
  contents: write

jobs:
  scrape-and-update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Ensure Firefox is installed
      run: playwright install firefox --with-deps

    - name: Run Scraper Script
      # Adjust "app.py" if your script file has a different name
      run: python app.py

    - name: Commit and Push Updated Playlist to Main
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add playlist.m3u
        # Only commits and pushes if tokens have actually changed
        git diff-index --quiet HEAD || (git commit -m "Automated token update" && git push)
