name: Generate and Update IPTV Playlist

on:
  push:
    branches: [ main, master ]
  schedule:
    # Runs automatically every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright

    - name: Ensure Firefox is installed
      run: playwright install firefox --with-deps

    - name: Install Multimedia Codecs and Utilities
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg ubuntu-restricted-extras xvfb

    - name: Run Scraper Script with Virtual Framebuffer
      run: |
        xvfb-run --server-args="-screen 0 1920x1080x24" python app.py

    - name: Commit and Push Updated Playlist to Main
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        git add playlist.m3u
        git diff-index --quiet HEAD || (git commit -m "Automated token update" && git push)
